<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>100Shops</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQrvxB9VMKkG8eR2v7/6I4fM5Q1I6fQ=" crossorigin="">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">名店を巡る</p>
        <h1>100Shops</h1>
      </div>
      <div class="header-actions">
        <button class="icon-button" id="importButton" type="button" aria-label="CSV取り込み" title="CSV取り込み">
          <i data-lucide="upload"></i>
        </button>
        <button class="icon-button" id="resetButton" type="button" aria-label="初期データに戻す" title="初期データに戻す">
          <i data-lucide="rotate-ccw"></i>
        </button>
      </div>
    </header>

    <main class="app-shell">
      <button class="edge-toggle sidebar-toggle" id="sidebarToggle" type="button" aria-label="一覧を畳む" title="一覧を畳む">
        <i data-lucide="panel-left-close"></i>
      </button>

      <aside class="sidebar" aria-label="店舗一覧">
        <section class="filters" aria-label="絞り込み">
          <button class="section-toggle" id="filtersToggle" type="button" aria-expanded="true" aria-controls="filtersBody">
            <span>
              <i data-lucide="sliders-horizontal"></i>
              検索条件
            </span>
            <i data-lucide="chevron-up" class="toggle-chevron"></i>
          </button>

          <div class="filters-body" id="filtersBody">
            <label class="search-box">
              <i data-lucide="search"></i>
              <input id="searchInput" type="search" placeholder="店名、ジャンル、住所、駅、メモで検索">
            </label>

            <div class="filter-row">
              <label>
                <span>データ</span>
                <select id="datasetSelect"></select>
              </label>
              <label>
                <span>都道府県</span>
                <select id="prefectureFilter"></select>
              </label>
              <label>
                <span>市区町村</span>
                <select id="localityFilter"></select>
              </label>
              <label>
                <span>並び順</span>
                <select id="sortSelect">
                  <option value="rank">掲載順</option>
                  <option value="name">店名</option>
                  <option value="area">エリア</option>
                </select>
              </label>
            </div>
          </div>
        </section>

        <div class="list-meta">
          <strong id="resultCount">0件</strong>
          <span id="datasetLabel">サンプル</span>
        </div>

        <section class="shop-list" id="shopList" aria-label="検索結果"></section>
      </aside>

      <section class="map-panel" aria-label="地図と詳細">
        <div id="map" class="map"></div>
        <button class="detail-toggle" id="detailToggle" type="button" aria-label="詳細を畳む" title="詳細を畳む">
          <i data-lucide="panel-right-close"></i>
          <span>詳細</span>
        </button>
        <article class="detail" id="shopDetail" aria-live="polite"></article>
      </section>
    </main>

    <dialog id="importDialog" class="import-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>CSV取り込み</h2>
          <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">
            <i data-lucide="x"></i>
          </button>
        </div>
        <p class="dialog-note">ヘッダー付きCSVを貼り付けます。最低限 `name,address,lat,lng` があれば表示できます。</p>
        <textarea id="csvInput" spellcheck="false" placeholder="name,tabelogUrl,area,station,address,lat,lng&#10;店名,https://tabelog.com/...,新宿,新宿駅,東京都...,35.69,139.70"></textarea>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="submit">キャンセル</button>
          <button class="primary-button" id="applyImportButton" value="default" type="button">
            <i data-lucide="file-check"></i>
            取り込む
          </button>
        </div>
      </form>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="data/shops-basic.js"></script>
    <script src="script.js"></script>
  </body>
</html>
